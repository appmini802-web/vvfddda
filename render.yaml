services:
  - type: web
    name: adsgram-mini-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: VITE_ADSGRAM_BLOCK_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PGHOST
        fromDatabase:
          name: adsgram-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: adsgram-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: adsgram-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: adsgram-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: adsgram-db
          property: password

databases:
  - name: adsgram-db
    databaseName: adsgram
    user: adsgram_user
    plan: free
